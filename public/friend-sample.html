<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend's Homepage Design</title>
    <style>
        .friend-hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 100px 20px;
            text-align: center;
            border-radius: 20px;
            margin: 20px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .friend-hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 800;
        }
        .friend-hero p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .friend-btn {
            background: white;
            color: #1e3a8a;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s;
            display: inline-block;
        }
        .friend-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="friend-hero" data-section-id="friend-test-section">
        <h1>Welcome to the Future</h1>
        <p>This is a sample design "connected" from an external VS Code file. Any changes made to the source will reflect here.</p>
        <a href="#" class="friend-btn">Get Started Now</a>
    </div>
</body>
</html>
